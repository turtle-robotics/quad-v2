name: Build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman-key --init && pacman -Syu --noconfirm git cmake ninja doxygen gtest
          eigen spdlog
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup CMake
        run: cmake --preset local -DBUILD_TESTING=OFF
      - name: Build code
        run: cmake --build build
      - name: Build docs
        run: cmake --build build --target libquaddocs
      - name: Upload GitHub Pages artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/docs/html
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
