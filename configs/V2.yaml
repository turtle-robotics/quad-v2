name: TURTLE QUAD V2
chassis:
  leg_offset: [0.31559532, 0.063, 0.0000] # m
  mass: 15.0 # kg
  inertia: [0.0, 0.0, 0.0] # kg*m^2
joints:
  shoulder:
    len: 0.115 # m
    mass: 0.0 # kg
    inertia: [0.0, 0.0, 0.0] # kg*m^2
    thetamin: -1.571 # rad
    thetamax: 1.571 # rad
  upper:
    len: 0.200 # m
    mass: 0.0 # kg
    inertia: [0.0, 0.0, 0.0] # kg*m^2
    thetamin: -0.785 # rad
    thetamax: 1.571 # rad
  lower:
    len: 0.200 # m
    mass: 0.0 # kg
    inertia: [0.0, 0.0, 0.0] # kg*m^2
    thetaMin: 0.099 # rad
    thetaMax: 0.417 # rad
  foot:
    len: 0.020 # m
    mass: 0.0 # kg
    inertia: [0.0, 0.0, 0.0] # kg*m^2
servomap:
  1: [11, 12, 13]
  2: [21, 22, 23]
  3: [31, 32, 33]
  4: [41, 42, 43]
  5: [1]
motor_config:
  - servopos.position_max nan
  - servopos.position_min nan
  - servo.pid_position.kp 150.0
  - servo.pid_position.ki 20.0
  - servo.pid_position.kd 10.0
  - servo.pid_position.ilimit 100.0
  - servo.max_velocity 10.0
  - servo.default_velocity_limit 5.0
  - servo.default_accel_limit 10.0
  # - servo.default_torque_limit 1.0
  - motor_position.rotor_to_output_ratio 0.0526315789
  - motor_position.output.sign 1
  - servo.max_voltage 54.0
gamepad: /dev/input/by-id/usb-Logitech_Wireless_Gamepad_F710_D63B91BB-event-joystick

home_pose:
  - [+0.250, +0.000, +0.016]
  - [+0.250, -0.000, -0.016]
  - [-0.250, +0.000, +0.016]
  - [-0.250, -0.000, -0.016]

deploy_cmds:
  a:
    - [+0.250, +0.000, +0.100]
    - [-0.250, -0.000, -0.100]
    - [-0.250, +0.000, +0.100]
    - [+0.250, -0.000, -0.100]
  b:
    - [+0.125, +0.000, +0.100]
    - [-0.125, -0.000, -0.100]
    - [-0.125, +0.000, +0.100]
    - [+0.125, -0.000, -0.100]
  c:
    - [+0.000, +0.125, +0.100]
    - [-0.000, -0.125, -0.100]
    - [-0.000, +0.125, +0.100]
    - [+0.000, -0.125, -0.100]

motor_directions:
  1: [1, -1, 1]
  2: [1, 1, -1]
  3: [-1, -1, 1]
  4: [-1, 1, -1]
